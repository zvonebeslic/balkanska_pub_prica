  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --page-bg: #0b1220;
      --card-bg: #162235;
      --card-soft: #101b2d;
      --blue: #2f80ff;
      --blue-dark: #1d5fd6;
      --blue-soft: rgba(47, 128, 255, 0.18);
      --green: #22c55e;
      --text-main: #f5f7fb;
      --text-muted: #a8b3c7;
      --border: rgba(148, 163, 184, 0.22);
      --shadow: 0 18px 45px rgba(0,0,0,0.35);
      --radius-lg: 24px;
      --radius-pill: 999px;
    }

    html, body { min-height: 100%; }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47, 128, 255, 0.14), transparent 42%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.10), transparent 38%),
        var(--page-bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    button, input { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.7rem 1rem;
      background: #000000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(14px);
    }

    .header-side { display: flex; align-items: center; }
    .header-side--left { justify-content: flex-start; }
    .header-side--right { justify-content: flex-end; }

    .brand-logo {
      justify-self: center;
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      text-decoration: none;
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
      font-size: clamp(2rem, 7vw, 4rem);
      text-transform: none;
    }

    .logo-kviz { color: #ffffff; }
    .logo-to { color: var(--blue); }
    .logo-go { color: var(--green); }

    .login-btn,
    .flag-toggle {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: none;
      text-decoration: none;
    }

    .login-btn:hover,
    .flag-toggle:hover { background: rgba(255, 255, 255, 0.15); }

    .login-icon { width: 22px; height: 22px; }

    .flag-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 1.15rem;
      background: var(--blue-soft);
    }

    .flag-icon::before { content: "🇭🇷"; }
    .flag-toggle[data-current-lang="en"] .flag-icon::before { content: "🇬🇧"; }

    .auth-shell {
      flex: 1;
      width: min(420px, calc(100% - 1.2rem));
      margin: 1rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.2rem;
      box-shadow: var(--shadow);
    }

    h1 {
      text-align: center;
      font-size: 1.35rem;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      margin-top: 0.3rem;
      padding: 0.75rem;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card-soft);
      color: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px var(--blue-soft);
    }

    .password-wrap {
      position: relative;
      margin-top: 0.3rem;
    }

    .password-wrap input {
      margin-top: 0;
      padding-right: 3rem;
    }

    .password-toggle {
      position: absolute;
      right: 0.35rem;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      box-shadow: none;
      transition: none;
      animation: none;
      -webkit-tap-highlight-color: transparent;
    }

    .password-toggle:hover,
    .password-toggle:focus,
    .password-toggle:focus-visible,
    .password-toggle:active {
      background: transparent;
      outline: none;
      box-shadow: none;
      transform: translateY(-50%);
    }

    .password-toggle svg {
      width: 22px;
      height: 22px;
      min-width: 22px;
      min-height: 22px;
      max-width: 22px;
      max-height: 22px;
      display: block;
      flex: 0 0 22px;
      transition: none;
      animation: none;
      transform: none;
    }

    .password-toggle[data-visible="true"] {
      color: #ffffff;
    }

    .password-toggle[data-visible="false"] {
      color: #94a3b8;
    }

    .password-rules {
      margin-top: 0.35rem;
      color: var(--text-muted);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .btn {
      width: 100%;
      margin-top: 1rem;
      min-height: 45px;
      border: 0;
      border-radius: var(--radius-pill);
      background: var(--blue);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }

    .btn:hover { background: var(--blue-dark); }

    .google-btn {

      margin-bottom: 0.9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: #ffffff;
      color: #111827;
      font-weight: 850;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;

    }

    .google-btn:hover { background: #f1f5f9; }

    .google-icon {

    .divider {

      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.9rem;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .divider::before,

      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .links {
      margin-top: 1rem;
      text-align: center;
      display: grid;
      gap: 0.45rem;
    }

    .link-btn {
      background: none;
      border: 0;
      color: var(--blue);
      font-weight: 800;
      cursor: pointer;
    }

    .forgot-btn {
      background: none;
      border: 0;
      color: #94a3b8;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .message {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: #facc15;
      text-align: center;
      min-height: 1.2rem;
    }

    .back {
      display: block;
      margin-top: 1rem;
      text-align: center;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .back:hover { color: #ffffff; }

    .site-footer {
      margin-top: auto;
      padding: 1.1rem 0.75rem 1.3rem;
      text-align: center;
      color: rgba(255, 255, 255, 0.72);
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .footer-links,
    .footer-icons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .footer-links a {
      min-width: 118px;
      min-height: 38px;
      padding: 0.55rem 1rem;
      border: 1px solid rgba(47, 128, 255, 0.65);
      border-radius: var(--radius-pill);
      background: #111827;
      color: #ffffff;
      text-decoration: none;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .footer-links a:hover { background: #162235; border-color: var(--blue); }

    .footer-icons { margin-top: 0.65rem; }

    .footer-icon {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      text-decoration: none;
      font-weight: 850;
    }

    .footer-copy {
      margin-top: 0.65rem;
      font-size: 0.78rem;
    }

    @media (max-width: 640px) {
      .site-header {
        grid-template-columns: 46px 1fr 46px;
        padding: 0.55rem 0.65rem;
      }

      .login-btn,
      .flag-toggle { width: 39px; height: 39px; }

      .brand-logo { font-size: clamp(2rem, 12vw, 3.1rem); }
    }
  </style>

    const i18n = {

    let currentLang = "hr";
    let mode = "login";

    const form = document.getElementById("auth-form");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const titleEl = document.getElementById("auth-title");
    const subtitleEl = document.getElementById("auth-subtitle");
    const submitBtn = document.getElementById("submit-btn");
    const toggleBtn = document.getElementById("toggle-mode-btn");
    const forgotBtn = document.getElementById("forgot-btn");
    const messageEl = document.getElementById("message");
    const passwordToggle = document.getElementById("password-toggle");
    const passwordRules = document.getElementById("password-rules");
    const flagBtn = document.getElementById("language-cycle-btn");
    const googleLoginBtn = document.getElementById("google-login-btn");

    document.getElementById("year").textContent = new Date().getFullYear();

    function dict() { return i18n[currentLang] || i18n.hr; }

    function applyTranslations() {
      const d = dict();
      document.documentElement.lang = currentLang;

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (key && d[key]) el.textContent = d[key];
      });

      titleEl.textContent = mode === "login" ? d.authTitleLogin : d.authTitleRegister;
      subtitleEl.textContent = mode === "login" ? d.authSubtitleLogin : d.authSubtitleRegister;
      submitBtn.textContent = mode === "login" ? d.submitLogin : d.submitRegister;
      toggleBtn.textContent = mode === "login" ? d.toggleRegister : d.toggleLogin;
      passwordToggle.setAttribute("aria-label", passwordEl.type === "password" ? d.showPassword : d.hidePassword);
      flagBtn.setAttribute("data-current-lang", currentLang);
      flagBtn.setAttribute("aria-label", currentLang === "hr" ? "Promijeni jezik na engleski" : "Switch language to Croatian");
    }

    function setMode(nextMode) {
      mode = nextMode;
      messageEl.textContent = "";
      passwordRules.style.display = mode === "register" ? "block" : "none";
      passwordEl.setAttribute("autocomplete", mode === "register" ? "new-password" : "current-password");
      applyTranslations();
    }

    function isStrongPassword(password) {
      return password.length >= 6 && /\d/.test(password) && /[^A-Za-z0-9]/.test(password);
    }

    let redirectingToProfile = false;

    async function goToProfile(session) {
      if (!session || redirectingToProfile) return;

      const savedLoginTime = Number(localStorage.getItem(SESSION_TIME_KEY));
      const loginTime = savedLoginTime || Date.now();

      if (!savedLoginTime) {
        localStorage.setItem(SESSION_TIME_KEY, String(loginTime));
      }

      if (Date.now() - loginTime < THREE_DAYS_MS) {
        redirectingToProfile = true;
        window.location.replace("profil.html");
        return;
      }

      await supabaseClient.auth.signOut();
      localStorage.removeItem(SESSION_TIME_KEY);
    }

    async function checkExistingSession() {
      // Na profil preusmjeravamo samo nakon stvarnog OAuth povratka.
      // Običan dolazak na login stranicu više ne koristi staru aktivnu sesiju.
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const authError = hashParams.get("error_description") || hashParams.get("error");
      const isOAuthCallback =
        hashParams.has("access_token") ||
        hashParams.has("refresh_token") ||
        hashParams.has("provider_token");

      if (authError) {
        messageEl.textContent = `${dict().msgGoogleError} ${decodeURIComponent(authError)}`;
        history.replaceState({}, document.title, window.location.pathname);
        return;
      }

      if (!isOAuthCallback) return;

      const { data, error } = await supabaseClient.auth.getSession();

      if (error || !data?.session) {
        messageEl.textContent = `${dict().msgGoogleError} ${error?.message || ""}`.trim();
        return;
      }

      history.replaceState({}, document.title, window.location.pathname);
      localStorage.setItem(SESSION_TIME_KEY, String(Date.now()));
      await goToProfile(data.session);
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      // INITIAL_SESSION namjerno ignoriramo jer može biti stara spremljena sesija.
      if (event === "SIGNED_IN" && session) {
        window.setTimeout(() => {
          goToProfile(session);
        }, 0);
      }
    });

    flagBtn.addEventListener("click", () => {
      currentLang = currentLang === "hr" ? "en" : "hr";
      applyTranslations();
    });

    passwordToggle.addEventListener("click", () => {
      const showPassword = passwordEl.type === "password";

      passwordEl.type = showPassword ? "text" : "password";
      passwordToggle.dataset.visible = showPassword ? "true" : "false";

      document.getElementById("eye-open-icon").style.display =
        showPassword ? "block" : "none";

      document.getElementById("eye-closed-icon").style.display =
        showPassword ? "none" : "block";

      applyTranslations();
    });

    toggleBtn.addEventListener("click", () => {
      setMode(mode === "login" ? "register" : "login");
    });

    googleLoginBtn.addEventListener("click", async () => {
      messageEl.textContent = "";
      googleLoginBtn.disabled = true;

      // Radi i na glavnoj domeni i ako je stranica smještena u podmapi.
      const redirectUrl = new URL("login.html", window.location.href).href;

      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: redirectUrl,
          queryParams: {
            prompt: "select_account"
          }
        }
      });

      if (error) {
        googleLoginBtn.disabled = false;
        messageEl.textContent = `${dict().msgGoogleError} ${error.message}`;
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailEl.value.trim();
      const password = passwordEl.value.trim();
      const d = dict();

      messageEl.textContent = "";

      if (mode === "login") {
        // Ukloni eventualnu staru lokalnu sesiju prije nove prijave.
        // Tako upisani e-mail i lozinka moraju stvarno proći provjeru.
        await supabaseClient.auth.signOut({ scope: "local" });
        localStorage.removeItem(SESSION_TIME_KEY);
        redirectingToProfile = false;

        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error || !data?.session || !data?.user) {
          messageEl.textContent = d.msgWrong;
          return;
        }

        localStorage.setItem(SESSION_TIME_KEY, String(Date.now()));
        window.location.replace("profil.html");
        return;
      }

      if (mode === "register") {
        if (!isStrongPassword(password)) {
          messageEl.textContent = d.msgPasswordRule;
          return;
        }

        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: `${window.location.origin}/profil.html`
          }
        });

        if (error) {
          messageEl.textContent = error.message;
          return;
        }

        messageEl.textContent = d.msgRegisterSuccess;

        if (data.session) {
          localStorage.setItem(SESSION_TIME_KEY, String(Date.now()));
          window.location.href = "profil.html";
        }
      }
    });

    forgotBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const d = dict();

      if (!email) {
        messageEl.textContent = d.msgEmailFirst;
        return;
      }

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: new URL("reset-lozinke.html", window.location.href).href
      });

      if (error) {
        messageEl.textContent = error.message;
        return;
      }

      messageEl.textContent = d.msgResetSent;
    });

    setMode("login");
    checkExistingSession();
  </script>
</body>
</html>
