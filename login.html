<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>Login | KvizToGo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --page-bg: #0b1220;
      --card-bg: #162235;
      --card-soft: #101b2d;
      --blue: #2f80ff;
      --blue-dark: #1d5fd6;
      --blue-soft: rgba(47, 128, 255, 0.18);
      --green: #22c55e;
      --text-main: #f5f7fb;
      --text-muted: #a8b3c7;
      --border: rgba(148, 163, 184, 0.22);
      --shadow: 0 18px 45px rgba(0,0,0,0.35);
      --radius-lg: 24px;
      --radius-pill: 999px;
    }

    html, body { min-height: 100%; }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47, 128, 255, 0.14), transparent 42%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.10), transparent 38%),
        var(--page-bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    button, input { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.7rem 1rem;
      background: #000000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(14px);
    }

    .header-side { display: flex; align-items: center; }
    .header-side--left { justify-content: flex-start; }
    .header-side--right { justify-content: flex-end; }

    .brand-logo {
      justify-self: center;
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      text-decoration: none;
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
      font-size: clamp(2rem, 7vw, 4rem);
      text-transform: lowercase;
    }

    .logo-kviz { color: #ffffff; }
    .logo-to { color: var(--blue); }
    .logo-go { color: var(--green); }

    .login-btn,
    .flag-toggle {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: none;
      text-decoration: none;
    }

    .login-btn:hover,
    .flag-toggle:hover { background: rgba(255, 255, 255, 0.15); }

    .login-icon { width: 22px; height: 22px; }

    .flag-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 1.15rem;
      background: var(--blue-soft);
    }

    .flag-icon::before { content: "🇭🇷"; }
    .flag-toggle[data-current-lang="en"] .flag-icon::before { content: "🇬🇧"; }

    .auth-shell {
      flex: 1;
      width: min(420px, calc(100% - 1.2rem));
      margin: 1rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.2rem;
      box-shadow: var(--shadow);
    }

    h1 {
      text-align: center;
      font-size: 1.35rem;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      margin-top: 0.3rem;
      padding: 0.75rem;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card-soft);
      color: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px var(--blue-soft);
    }

    .password-wrap {
      position: relative;
      margin-top: 0.3rem;
    }

    .password-wrap input {
      margin-top: 0;
      padding-right: 3rem;
    }

    .password-toggle {
      position: absolute;
      right: 0.35rem;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
    }

    .password-toggle:hover { color: #ffffff; background: rgba(255,255,255,0.08); }

    .password-rules {
      margin-top: 0.35rem;
      color: var(--text-muted);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .btn {
      width: 100%;
      margin-top: 1rem;
      min-height: 45px;
      border: 0;
      border-radius: var(--radius-pill);
      background: var(--blue);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }

    .btn:hover { background: var(--blue-dark); }

    .links {
      margin-top: 1rem;
      text-align: center;
      display: grid;
      gap: 0.45rem;
    }

    .link-btn {
      background: none;
      border: 0;
      color: var(--blue);
      font-weight: 800;
      cursor: pointer;
    }

    .forgot-btn {
      background: none;
      border: 0;
      color: #94a3b8;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .message {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: #facc15;
      text-align: center;
      min-height: 1.2rem;
    }

    .back {
      display: block;
      margin-top: 1rem;
      text-align: center;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .back:hover { color: #ffffff; }

    .site-footer {
      margin-top: auto;
      padding: 1.1rem 0.75rem 1.3rem;
      text-align: center;
      color: rgba(255, 255, 255, 0.72);
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .footer-links,
    .footer-icons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .footer-links a {
      min-width: 118px;
      min-height: 38px;
      padding: 0.55rem 1rem;
      border: 1px solid rgba(47, 128, 255, 0.65);
      border-radius: var(--radius-pill);
      background: #111827;
      color: #ffffff;
      text-decoration: none;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .footer-links a:hover { background: #162235; border-color: var(--blue); }

    .footer-icons { margin-top: 0.65rem; }

    .footer-icon {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      text-decoration: none;
      font-weight: 850;
    }

    .footer-copy {
      margin-top: 0.65rem;
      font-size: 0.78rem;
    }

    @media (max-width: 640px) {
      .site-header {
        grid-template-columns: 46px 1fr 46px;
        padding: 0.55rem 0.65rem;
      }

      .login-btn,
      .flag-toggle { width: 39px; height: 39px; }

      .brand-logo { font-size: clamp(2rem, 12vw, 3.1rem); }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-side header-side--left">
      <button class="flag-toggle" id="language-cycle-btn" type="button" data-current-lang="hr" aria-label="Promijeni jezik">
        <span class="flag-icon" aria-hidden="true"></span>
      </button>
    </div>

    <a href="index.html" class="brand-logo" aria-label="KvizToGo početna">
      <span class="logo-kviz">kviz</span><span class="logo-to">to</span><span class="logo-go">go</span>
    </a>

    <div class="header-side header-side--right">
      <a href="index.html" class="login-btn" aria-label="Početna">
        <svg class="login-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 11.5 12 4l9 7.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5.5 10.5V20h13v-9.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>
  </header>

  <main class="auth-shell">
    <section class="auth-card">
      <h1 id="auth-title" data-i18n="authTitleLogin">Prijava</h1>
      <p class="subtitle" id="auth-subtitle" data-i18n="authSubtitleLogin">Prijavi se za ulazak u svoj profil.</p>

      <form id="auth-form">
        <label>
          <span data-i18n="emailLabel">E-mail</span>
          <input type="email" id="email" required autocomplete="email">
        </label>

        <label>
          <span data-i18n="passwordLabel">Lozinka</span>
          <div class="password-wrap">
            <input type="password" id="password" required minlength="6" autocomplete="current-password">
            <button class="password-toggle" id="password-toggle" type="button" aria-label="Prikaži lozinku">◉</button>
          </div>
          <div class="password-rules" id="password-rules" data-i18n="passwordRules" style="display:none;">
            Lozinka mora imati najmanje 6 znakova, barem jedan broj i barem jedan poseban znak.
          </div>
        </label>

        <button class="btn" type="submit" id="submit-btn" data-i18n="submitLogin">Prijavi se</button>
      </form>

      <div class="links">
        <button class="link-btn" type="button" id="toggle-mode-btn" data-i18n="toggleRegister">Registriraj se</button>
        <button class="forgot-btn" type="button" id="forgot-btn" data-i18n="forgotPassword">Zaboravili ste lozinku?</button>
      </div>

      <p class="message" id="message"></p>

      <a href="index.html" class="back" data-i18n="backHome">← Povratak na početnu</a>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="podrska.html" data-i18n="footerSupport">Podrška</a>
      <a href="legalno.html" data-i18n="footerLegal">Legalno</a>
    </div>

    <div class="footer-icons">
      <a href="https://instagram.com/" target="_blank" rel="noopener" class="footer-icon" aria-label="Instagram">IG</a>
      <a href="mailto:info@kviztogo.com" class="footer-icon" aria-label="Email">✉</a>
    </div>

    <p class="footer-copy">© <span id="year"></span> <span data-i18n="footerMain">KvizToGo – Svi kvizovi na jednom mjestu.</span></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://hssfjguysejbosvholqu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_1wlZVov1csReXuZEgcuInA_7F7_gzIy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const SESSION_TIME_KEY = "kviztogo_login_time";
    const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;

    const i18n = {
      hr: {
        authTitleLogin: "Prijava",
        authSubtitleLogin: "Prijavi se za ulazak u svoj profil.",
        authTitleRegister: "Registracija",
        authSubtitleRegister: "Napravi profil za KvizToGo.",
        emailLabel: "E-mail",
        passwordLabel: "Lozinka",
        passwordRules: "Lozinka mora imati najmanje 6 znakova, barem jedan broj i barem jedan poseban znak.",
        submitLogin: "Prijavi se",
        submitRegister: "Registriraj se",
        toggleRegister: "Registriraj se",
        toggleLogin: "Već imaš profil? Prijavi se",
        forgotPassword: "Zaboravili ste lozinku?",
        backHome: "← Povratak na početnu",
        msgWrong: "Pogrešan e-mail ili lozinka.",
        msgPasswordRule: "Lozinka mora sadržavati barem jedan broj i barem jedan poseban znak.",
        msgRegisterSuccess: "Registracija uspješna. Provjeri e-mail ako je potrebna potvrda.",
        msgEmailFirst: "Prvo upiši e-mail adresu.",
        msgResetSent: "Link za reset lozinke poslan je na e-mail.",
        showPassword: "Prikaži lozinku",
        hidePassword: "Sakrij lozinku",
        footerMain: "KvizToGo – Svi kvizovi na jednom mjestu.",
        footerSupport: "Podrška",
        footerLegal: "Legalno"
      },
      en: {
        authTitleLogin: "Log in",
        authSubtitleLogin: "Log in to access your profile.",
        authTitleRegister: "Create account",
        authSubtitleRegister: "Create your KvizToGo profile.",
        emailLabel: "E-mail",
        passwordLabel: "Password",
        passwordRules: "Password must have at least 6 characters, one number and one special character.",
        submitLogin: "Log in",
        submitRegister: "Create account",
        toggleRegister: "Create account",
        toggleLogin: "Already have an account? Log in",
        forgotPassword: "Forgot your password?",
        backHome: "← Back to homepage",
        msgWrong: "Wrong e-mail or password.",
        msgPasswordRule: "Password must include at least one number and one special character.",
        msgRegisterSuccess: "Registration successful. Check your e-mail if confirmation is required.",
        msgEmailFirst: "Please enter your e-mail address first.",
        msgResetSent: "Password reset link has been sent to your e-mail.",
        showPassword: "Show password",
        hidePassword: "Hide password",
        footerMain: "KvizToGo – All quizzes in one place.",
        footerSupport: "Support",
        footerLegal: "Legal"
      }
    };

    let currentLang = "hr";
    let mode = "login";

    const form = document.getElementById("auth-form");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const titleEl = document.getElementById("auth-title");
    const subtitleEl = document.getElementById("auth-subtitle");
    const submitBtn = document.getElementById("submit-btn");
    const toggleBtn = document.getElementById("toggle-mode-btn");
    const forgotBtn = document.getElementById("forgot-btn");
    const messageEl = document.getElementById("message");
    const passwordToggle = document.getElementById("password-toggle");
    const passwordRules = document.getElementById("password-rules");
    const flagBtn = document.getElementById("language-cycle-btn");

    document.getElementById("year").textContent = new Date().getFullYear();

    function dict() { return i18n[currentLang] || i18n.hr; }

    function applyTranslations() {
      const d = dict();
      document.documentElement.lang = currentLang;

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (key && d[key]) el.textContent = d[key];
      });

      titleEl.textContent = mode === "login" ? d.authTitleLogin : d.authTitleRegister;
      subtitleEl.textContent = mode === "login" ? d.authSubtitleLogin : d.authSubtitleRegister;
      submitBtn.textContent = mode === "login" ? d.submitLogin : d.submitRegister;
      toggleBtn.textContent = mode === "login" ? d.toggleRegister : d.toggleLogin;
      passwordToggle.setAttribute("aria-label", passwordEl.type === "password" ? d.showPassword : d.hidePassword);
      flagBtn.setAttribute("data-current-lang", currentLang);
      flagBtn.setAttribute("aria-label", currentLang === "hr" ? "Promijeni jezik na engleski" : "Switch language to Croatian");
    }

    function setMode(nextMode) {
      mode = nextMode;
      messageEl.textContent = "";
      passwordRules.style.display = mode === "register" ? "block" : "none";
      passwordEl.setAttribute("autocomplete", mode === "register" ? "new-password" : "current-password");
      applyTranslations();
    }

    function isStrongPassword(password) {
      return password.length >= 6 && /\d/.test(password) && /[^A-Za-z0-9]/.test(password);
    }

    async function checkExistingSession() {
      const { data } = await supabaseClient.auth.getSession();
      const loginTime = Number(localStorage.getItem(SESSION_TIME_KEY));

      if (data.session && loginTime && Date.now() - loginTime < THREE_DAYS_MS) {
        window.location.href = "profil.html";
        return;
      }

      if (data.session && loginTime && Date.now() - loginTime >= THREE_DAYS_MS) {
        await supabaseClient.auth.signOut();
        localStorage.removeItem(SESSION_TIME_KEY);
      }
    }

    flagBtn.addEventListener("click", () => {
      currentLang = currentLang === "hr" ? "en" : "hr";
      applyTranslations();
    });

    passwordToggle.addEventListener("click", () => {
      const visible = passwordEl.type === "text";
      passwordEl.type = visible ? "password" : "text";
      passwordToggle.textContent = visible ? "◉" : "◌";
      applyTranslations();
    });

    toggleBtn.addEventListener("click", () => {
      setMode(mode === "login" ? "register" : "login");
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailEl.value.trim();
      const password = passwordEl.value.trim();
      const d = dict();

      messageEl.textContent = "";

      if (mode === "login") {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          messageEl.textContent = d.msgWrong;
          return;
        }

        localStorage.setItem(SESSION_TIME_KEY, String(Date.now()));
        window.location.href = "profil.html";
      }

      if (mode === "register") {
        if (!isStrongPassword(password)) {
          messageEl.textContent = d.msgPasswordRule;
          return;
        }

        const { error } = await supabaseClient.auth.signUp({ email, password });

        if (error) {
          messageEl.textContent = error.message;
          return;
        }

        localStorage.setItem(SESSION_TIME_KEY, String(Date.now()));
        messageEl.textContent = d.msgRegisterSuccess;

        window.setTimeout(() => {
          window.location.href = "profil.html";
        }, 1200);
      }
    });

    forgotBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const d = dict();

      if (!email) {
        messageEl.textContent = d.msgEmailFirst;
        return;
      }

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: "https://zvonebeslic.github.io/reset-lozinke.html"
      });

      if (error) {
        messageEl.textContent = error.message;
        return;
      }

      messageEl.textContent = d.msgResetSent;
    });

    checkExistingSession();
    setMode("login");
  </script>
</body>
</html>
